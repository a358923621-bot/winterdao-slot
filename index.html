<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>冬道煮 · 谢谢惠顾</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#efe7d2;
  display:flex;justify-content:center;align-items:center;
  min-height:100vh;font-family:"PingFang SC","Microsoft YaHei",sans-serif;
  padding:20px;user-select:none;
}
.machine{
  width:860px;max-width:95vw;
  background:#2f5b39;
  border:10px solid #bda77b;
  border-radius:24px;
  padding:20px 20px 24px;
  box-shadow:0 20px 60px rgba(0,0,0,.35);
  position:relative;
}
.machine::before{
  content:'';
  position:absolute;top:-16px;left:50%;transform:translateX(-50%);
  width:140px;height:8px;background:#bda77b;border-radius:4px;
}
/* 顶部灯带 */
.top-area{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:16px;
}
.lights{display:flex;gap:10px;flex-wrap:wrap;}
.light{
  width:16px;height:16px;border-radius:50%;
  background:#f2d16a;
  box-shadow:0 0 8px #f2d16a,0 0 16px rgba(242,209,106,.5);
  animation:blink .9s ease-in-out infinite alternate;
}
.light:nth-child(odd){animation-delay:.45s}
.light:nth-child(3n){background:#f0b88a;box-shadow:0 0 8px #f0b88a,0 0 16px rgba(240,184,138,.4);}
.light:nth-child(5n){background:#a8c9a0;box-shadow:0 0 8px #a8c9a0,0 0 16px rgba(168,201,160,.4);}
@keyframes blink{
  0%{opacity:.3;transform:scale(.8)}
  100%{opacity:1;transform:scale(1.1)}
}
.score-box{
  background:rgba(0,0,0,.2);padding:6px 16px;border-radius:8px;
  border:1px solid rgba(189,167,123,.2);
  color:#d4dec8;font-size:14px;font-weight:600;
}
.score-box .hl{color:#f2d16a;font-size:16px;}
/* 标题 — 品牌logo */
.title-area{text-align:center;margin-bottom:14px;}
.title-area .logo-img{
  display:block;width:80%;max-width:500px;margin:0 auto;
  filter:drop-shadow(0 4px 12px rgba(0,0,0,.3));
}
.title-area .sub{
  color:rgba(245,237,215,.4);font-size:14px;letter-spacing:8px;margin-top:2px;
}
/* ===== 窗口 — 参考原模板比例 ===== */
.screen{
  background:#1a2e19;border-radius:14px;padding:10px;
  border:4px solid #bda77b;box-shadow:inset 0 0 40px rgba(0,0,0,.6);
  position:relative;margin-bottom:14px;
}
.screen::after{
  content:'';position:absolute;top:0;left:0;right:0;bottom:0;
  background:linear-gradient(180deg,rgba(255,255,255,.04) 0%,transparent 40%);
  pointer-events:none;z-index:5;border-radius:10px;
}
/* ===== 4列卷轴 ===== */
.reels-row{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;aspect-ratio:4/1.2;
}
.reel{
  position:relative;overflow:hidden;
  border-radius:8px;background:#2a4a28;
  aspect-ratio:1/1;
}
.reel-strip{
  display:flex;flex-direction:column;
  will-change:transform;
}
.reel-strip img{
  display:block;width:100%;aspect-ratio:1/1;
  object-fit:cover;flex-shrink:0;
}
/* 中奖 */
.reel.win{
  box-shadow:0 0 20px rgba(242,209,106,.4);
  border-radius:8px;
  animation:winPulse .45s ease-in-out 3;
}
.reel.win::after{
  content:'';position:absolute;top:0;left:0;right:0;bottom:0;
  border:4px solid #f2d16a;border-radius:8px;pointer-events:none;z-index:3;
}
@keyframes winPulse{
  0%,100%{box-shadow:0 0 6px rgba(242,209,106,.1);}
  50%{box-shadow:0 0 30px rgba(242,209,106,.5);}
}
/* 结果 */
.result{
  text-align:center;min-height:36px;
  display:flex;align-items:center;justify-content:center;margin-bottom:12px;
}
.result-text{
  font-size:24px;font-weight:700;letter-spacing:4px;opacity:.6;color:#d4dec8;
}
.result-text.spin-hint{color:#f2d16a;opacity:1;}
.result-text.win-text{color:#f2d16a;opacity:1;}
/* ===== 按钮 — 参考原模板金色按钮 ===== */
.controls{text-align:center;}
.btn-spin{
  padding:14px 50px;font-size:24px;font-weight:700;border:none;
  border-radius:12px;cursor:pointer;letter-spacing:8px;
  background:#f2d16a;color:#1c2a1a;
  box-shadow:0 6px 0 #b38f3a,0 8px 20px rgba(0,0,0,.3);
  transition:all .12s;
}
.btn-spin:hover:not(:disabled){
  background:#f7da7c;transform:translateY(-3px);
  box-shadow:0 9px 0 #b38f3a,0 12px 30px rgba(0,0,0,.4);
}
.btn-spin:disabled{
  opacity:.5;transform:translateY(3px);box-shadow:0 3px 0 #b38f3a;cursor:not-allowed;
}
.footer{
  display:flex;justify-content:center;margin-top:14px;gap:30px;
}
.footer span{
  color:rgba(245,237,215,.6);font-size:12px;letter-spacing:3px;font-weight:300;
}
/* ===== 弹窗 — 原模板风格 ===== */
.modal-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,.5);backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;
  z-index:1000;opacity:0;pointer-events:none;
  transition:opacity .35s ease;padding:20px;
}
.modal-overlay.open{opacity:1;pointer-events:auto;}
.modal-box{
  background:#efe7d2;border:8px solid #bda77b;border-radius:24px;
  max-width:420px;width:100%;padding:32px 28px 28px;
  box-shadow:0 40px 100px rgba(0,0,0,.5);
  transform:scale(.8) translateY(30px);
  transition:transform .4s cubic-bezier(.34,1.56,.64,1);
  text-align:center;position:relative;
}
.modal-overlay.open .modal-box{transform:scale(1) translateY(0);}
.modal-box::before{
  content:'';position:absolute;top:-12px;left:50%;transform:translateX(-50%);
  width:100px;height:7px;background:#bda77b;border-radius:3px;
}
.modal-icon{font-size:64px;display:block;margin-bottom:6px;}
.modal-title{font-size:32px;font-weight:900;letter-spacing:4px;margin-bottom:4px;}
.modal-title.win{color:#b8860b;}
.modal-title.lose{color:#5a6a52;}
.modal-sub{font-size:16px;color:#7a8a72;margin-bottom:14px;font-weight:500;}
.modal-result-img{
  width:140px;height:140px;margin:0 auto 16px;
  border-radius:14px;overflow:hidden;border:3px solid #cbb68d;
}
.modal-result-img img{width:100%;height:100%;object-fit:cover;display:block;}
.modal-result-img.highlight{border-color:#f2d16a;box-shadow:0 0 16px rgba(242,209,106,.3);}
.modal-btn{
  padding:12px 44px;font-size:20px;font-weight:700;border:none;
  border-radius:10px;cursor:pointer;letter-spacing:6px;
  background:#f2d16a;color:#1c2a1a;
  box-shadow:0 5px 0 #b38f3a;transition:all .12s;
}
.modal-btn:hover{transform:translateY(-2px);box-shadow:0 7px 0 #b38f3a;}
.modal-btn:active{transform:scale(.95);}
/* ===== 防伪信息 ===== */
.security-bar{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:14px;padding:8px 12px;
  background:rgba(0,0,0,.06);border-radius:6px;
  font-size:11px;color:#8a9a82;font-weight:500;
  font-family:"Courier New",monospace;
  letter-spacing:.5px;user-select:all;
}
.security-bar .sec-left{text-align:left;line-height:1.6;}
.security-bar .sec-right{text-align:right;line-height:1.6;}
.security-bar .sec-label{color:#5a6a52;font-size:9px;text-transform:uppercase;font-weight:700;letter-spacing:1px;}
.security-bar .sec-code{color:#b8860b;font-weight:700;font-size:13px;}
/* 防伪底纹 */
.modal-box .anti-wm{
  position:absolute;top:0;left:0;right:0;bottom:0;
  pointer-events:none;overflow:hidden;border-radius:16px;z-index:0;
}
.modal-box .anti-wm::before{
  content:'';position:absolute;
  top:-50%;left:-50%;width:200%;height:200%;
  background:repeating-linear-gradient(
    45deg,transparent 0px,transparent 40px,
    rgba(47,91,57,.03) 40px,rgba(47,91,57,.03) 41px
  );
}
.modal-box > *:not(.anti-wm){position:relative;z-index:1;}
.modal-confetti{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:1001;overflow:hidden;}
.modal-confetti .piece{
  position:absolute;width:8px;height:8px;top:-10px;animation:mFall linear forwards;
}
@keyframes mFall{
  0%{transform:translateY(0)rotate(0deg);opacity:1}
  100%{transform:translateY(110vh)rotate(720deg);opacity:0}
}
@media(max-width:880px){
  .machine{width:100%;padding:16px 14px 20px;}
  .title-area .logo-img{width:90%;}
  .screen{padding:6px;border-width:3px;}
  .reels-row{gap:5px;}
  .result-text{font-size:18px;}
  .btn-spin{font-size:18px;padding:10px 30px;letter-spacing:6px;}
  .modal-box{padding:24px 18px 22px;max-width:95vw;}
  .modal-title{font-size:24px;}
  .modal-icon{font-size:48px;}
  .modal-result-img{width:110px;height:110px;}
  .top-area{flex-direction:column;gap:6px;}
}
@media(max-width:480px){
  .title-area .logo-img{width:95%;}
  .title-area .sub{font-size:11px;letter-spacing:4px;}
  .screen{padding:4px;border-radius:10px;}
  .reels-row{gap:3px;aspect-ratio:4/1.4;}
  .result{min-height:26px;margin-bottom:8px;}
  .result-text{font-size:15px;letter-spacing:2px;}
  .btn-spin{font-size:15px;padding:8px 20px;letter-spacing:4px;box-shadow:0 4px 0 #b38f3a;}
  .light{width:10px;height:10px;}
  .score-box{font-size:11px;padding:4px 10px;}
  .footer span{font-size:10px;}
  .footer{gap:16px;margin-top:8px;}
}
</style>
</head>
<body>

<div class="machine">
  <!-- 灯带 + 积分 -->
  <div class="top-area">
    <div class="lights">
      <div class="light"></div><div class="light"></div><div class="light"></div>
      <div class="light"></div><div class="light"></div><div class="light"></div>
      <div class="light"></div><div class="light"></div><div class="light"></div>
    </div>
    <div class="score-box">
      积分 <span class="hl" id="scoreDisplay">100</span>
    </div>
  </div>

  <!-- 品牌logo -->
  <div class="title-area">
    <img class="logo-img" src="assets/冬道煮logo.png" alt="冬道煮">
    <div class="sub">· 好 运 连 连 ·</div>
  </div>

  <!-- 4列卷轴 -->
  <div class="screen">
    <div class="reels-row" id="reelsRow"></div>
  </div>

  <!-- 结果 -->
  <div class="result">
    <div class="result-text" id="resultText">🎰 点击抽奖试试手气</div>
  </div>

  <!-- 按钮 — 原模板金钮风格 -->
  <div class="controls">
    <button class="btn-spin" id="spinBtn" onclick="spin()">开始抽奖</button>
  </div>

  <div class="footer">
    <span>🍲 冬瓜盅靓汤，就到冬道煮。</span>
    <span>✨ 好运连连</span>
  </div>
</div>

<!-- ===== 弹窗 ===== -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <div class="anti-wm"></div>
    <span class="modal-icon" id="modalIcon">🎉</span>
    <div class="modal-title" id="modalTitle">恭喜中奖！</div>
    <div class="modal-sub" id="modalSub">全列匹配</div>
    <div class="modal-result-img" id="modalImg"><img src="" alt="菜品"></div>
    <div class="security-bar">
      <div class="sec-left">
        <div class="sec-label">NO.</div>
        <span id="secSerial">——</span>
      </div>
      <div class="sec-right">
        <div class="sec-label">TIME</div>
        <span id="secTime">——</span>
      </div>
    </div>
    <div class="security-bar" style="margin-top:6px;background:rgba(47,91,57,.08);">
      <div style="text-align:left;flex:1;line-height:1.6;">
        <div class="sec-label">验签</div>
        <span class="sec-code" id="secCode">——</span>
      </div>
      <div style="text-align:right;font-size:10px;color:#8a9a82;line-height:1.6;">
        门店核验有效<br>一次有效
      </div>
    </div>
    <button class="modal-btn" onclick="closeModal()">知道了</button>
  </div>
</div>
<div class="modal-confetti" id="modalConfetti"></div>

<script>
const A='assets/';
const ITEMS=[
  {n:'八宝冬瓜盅',f:'八宝冬瓜盅.jpg',wt:1},
  {n:'杂菜',f:'杂菜.jpg',wt:15},
  {n:'牛肉丸',f:'牛肉丸.jpg',wt:5},
  {n:'猪肉丸',f:'猪肉丸.jpg',wt:5},
  {n:'现切鲜牛肉',f:'现切鲜牛肉.jpg',wt:5},
  {n:'腐竹',f:'腐竹.png',wt:15},
  {n:'虾滑',f:'虾滑.jpg',wt:5},
  {n:'鱼腐',f:'鱼腐.png',wt:15},
];

function pickByWeight(){
  const total=ITEMS.reduce((s,i)=>s+i.wt,0);
  let r=Math.random()*total;
  for(let i=0;i<ITEMS.length;i++){r-=ITEMS[i].wt;if(r<=0)return i;}
  return ITEMS.length-1;
}
function gi(i){return A+ITEMS[i].f}

let busy=false;
let score=100;
let spinCount=0;
const COST=1;
const SALT='冬道煮2026';

const row=document.getElementById('reelsRow'),rst=document.getElementById('resultText'),sBtn=document.getElementById('spinBtn'),scEl=document.getElementById('scoreDisplay');
const mo=document.getElementById('modalOverlay'),mi=document.getElementById('modalIcon'),mt=document.getElementById('modalTitle'),ms=document.getElementById('modalSub'),mImg=document.getElementById('modalImg');
const secSerial=document.getElementById('secSerial'),secTime=document.getElementById('secTime'),secCode=document.getElementById('secCode');

function genVerification(board,isWin){
  spinCount++;
  const now=new Date();
  const pad=n=>String(n).padStart(2,'0');
  const dateStr=`${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}`;
  const timeStr=`${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  const serial=`DDZ${dateStr}-${String(spinCount).padStart(4,'0')}`;
  const raw=board.join(',')+serial+SALT;
  let hash=0;
  for(let i=0;i<raw.length;i++){
    hash=((hash<<5)-hash)+raw.charCodeAt(i);
    hash|=0;
  }
  const code='V'+Math.abs(hash).toString(36).toUpperCase().substring(0,6);
  return {serial,timeStr,dateStr,code};
}

function buildReels(result4){
  row.innerHTML='';
  for(let c=0;c<4;c++){
    const reel=document.createElement('div');
    reel.className='reel';
    const strip=document.createElement('div');
    strip.className='reel-strip';
    strip.id='rs'+c;
    for(let i=0;i<24;i++){
      const img=document.createElement('img');
      img.src=gi(pickByWeight());img.alt='';img.draggable=false;
      strip.appendChild(img);
    }
    const last=document.createElement('img');
    last.src=gi(result4[c]);last.alt=ITEMS[result4[c]].n;last.draggable=false;
    strip.appendChild(last);
    reel.appendChild(strip);
    row.appendChild(reel);
  }
}

function spin(){
  if(busy)return;
  if(score<COST){rst.textContent='😅 积分不够了！';return;}
  score-=COST;scEl.textContent=score;
  busy=true;sBtn.disabled=true;
  mo.classList.remove('open');
  document.querySelectorAll('.reel.win').forEach(r=>r.classList.remove('win'));

  const isWin=Math.random()<0.1;
  let board;
  if(isWin){const d=pickByWeight();board=[d,d,d,d];}
  else board=[pickByWeight(),pickByWeight(),pickByWeight(),pickByWeight()];

  buildReels(board);

  const reels=document.querySelectorAll('.reel');
  let cellH=reels[0].offsetWidth;
  if(cellH<10)cellH=80;

  for(let c=0;c<4;c++){
    const s=document.getElementById('rs'+c);
    s.style.transition='none';s.style.transform='translateY(0)';
    void s.offsetHeight;
  }

  rst.textContent='🎰 转 动 中...';
  rst.className='result-text spin-hint';

  const DIST=24*cellH;
  const DUR=[0.85,1.1,1.35,1.6];
  const DELAY=[0,0.10,0.22,0.36];

  for(let c=0;c<4;c++){
    const s=document.getElementById('rs'+c);
    s.style.transition=`transform ${DUR[c]*0.35}s cubic-bezier(0.3,0,1,1) ${DELAY[c]}s`;
    s.style.transform=`translateY(${-DIST*0.35}px)`;
  }

  for(let c=0;c<4;c++){
    ((idx)=>{
      const t=(DELAY[idx]+DUR[idx]*0.35)*1000;
      setTimeout(()=>{
        const s=document.getElementById('rs'+idx);
        s.style.transition=`transform ${DUR[idx]*0.65}s cubic-bezier(0.08,0.82,0.2,1)`;
        s.style.transform=`translateY(${-DIST}px)`;
      },t);
    })(c);
  }

  const total=(Math.max(...DUR)+Math.max(...DELAY))*1000+300;
  window._cellH=cellH;
  setTimeout(()=>finish(board),total);
}

function finish(board){
  busy=false;sBtn.disabled=false;
  const cellH=window._cellH||80;
  for(let c=0;c<4;c++){
    document.getElementById('rs'+c).style.transition='none';
    document.getElementById('rs'+c).style.transform=`translateY(${-24*cellH}px)`;
  }

  const win=board[0]===board[1]&&board[1]===board[2]&&board[2]===board[3];

  if(win){
    document.querySelectorAll('.reel').forEach(r=>r.classList.add('win'));
    rst.textContent='🎉 中奖啦！'+ITEMS[board[0]].n;
    rst.className='result-text win-text';
    setTimeout(()=>{showPopup(board[0],'win',board)},300);
  }else{
    rst.textContent='😅 谢谢惠顾，再来一次';
    rst.className='result-text';
    setTimeout(()=>{showPopup(null,'lose',board)},300);
  }
}

function showPopup(dishIdx,type,board){
  if(type==='win'){
    const item=ITEMS[dishIdx];
    mi.textContent='🎉';
    mt.textContent='四格全中 · '+item.n;
    mt.className='modal-title win';
    ms.textContent='好运爆棚！四道菜都是'+item.n+'！';
    mImg.style.display='block';
    mImg.querySelector('img').src=gi(dishIdx);
    mImg.querySelector('img').alt=item.n;
    mImg.className='modal-result-img highlight';
    mConfetti(40);
  }else{
    mi.textContent='😅';
    mt.textContent='谢谢惠顾';
    mt.className='modal-title lose';
    ms.textContent='别灰心，再来一次吧！';
    mImg.style.display='none';
  }
  // 防伪信息
  const sec=genVerification(board||[],type==='win');
  secSerial.textContent=sec.serial;
  secTime.textContent=sec.timeStr;
  secCode.textContent=sec.code;
  mo.classList.add('open');
}

function closeModal(){
  mo.classList.remove('open');
}

function mConfetti(n){
  const c=document.getElementById('modalConfetti'),cl=['#e8d5a3','#d4b87a','#a8c9a0','#f0b88a','#c4d4b8','#f7f1db'];
  c.innerHTML='';
  for(let i=0;i<n;i++){
    const el=document.createElement('div');el.className='piece';
    el.style.left=Math.random()*100+'%';el.style.background=cl[Math.floor(Math.random()*cl.length)];
    el.style.width=(5+Math.random()*8)+'px';el.style.height=(5+Math.random()*8)+'px';
    el.style.borderRadius=Math.random()>.5?'50%':'1px';
    el.style.animationDuration=(1.5+Math.random()*2.5)+'s';el.style.animationDelay=Math.random()*.5+'s';
    c.appendChild(el);
  }
  setTimeout(()=>c.innerHTML='',4500);
}

buildReels([pickByWeight(),pickByWeight(),pickByWeight(),pickByWeight()]);
rst.textContent='🎰 点击抽奖试试手气';

document.addEventListener('keydown',e=>{
  if(e.key===' '||e.key==='Enter'){e.preventDefault();mo.classList.contains('open')?closeModal():spin();}
  if(e.key==='Escape')closeModal();
});
</script>
</body>
</html>
